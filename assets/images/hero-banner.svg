<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090d0f"/>
      <stop offset="100%" stop-color="#0d1418"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="50%" r="42%">
      <stop offset="0%" stop-color="#9dd7ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#9dd7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="75%" cy="45%" r="36%">
      <stop offset="0%" stop-color="#7ee787" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#7ee787" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.7" fill="#1e2d33" opacity="0.7"/>
    </pattern>
    <style>
      @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }
      @keyframes flow  { 0%{stroke-dashoffset:36} 100%{stroke-dashoffset:0} }
      .clb-active { animation: pulse 2.4s ease-in-out infinite; }
      .df1 { animation: flow 1.8s linear infinite; }
      .df2 { animation: flow 1.8s linear infinite .6s; }
      .df3 { animation: flow 1.8s linear infinite 1.2s; }
    </style>
  </defs>

  <!-- ── Background ─────────────────────────────────────── -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#dots)"/>
  <rect width="1200" height="360" fill="url(#glow1)"/>
  <rect width="1200" height="360" fill="url(#glow2)"/>

  <!-- Divider between FPGA and pipeline sections -->
  <line x1="400" y1="18" x2="400" y2="342" stroke="#1d2d35" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ═══════════════════ FPGA DIE (left, x=40–390) ═══════════════════ -->

  <!-- Chip package -->
  <rect x="42" y="36" width="312" height="288" rx="8" fill="#0b1519" stroke="#2c4556" stroke-width="1.5"/>

  <!-- IO pads – top edge -->
  <rect x="70"  y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="106" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="142" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="178" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="214" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="250" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="286" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="322" y="27" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>

  <!-- IO pads – bottom edge -->
  <rect x="70"  y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="106" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="142" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="178" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="214" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="250" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="286" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="322" y="325" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>

  <!-- IO pads – left edge -->
  <rect x="32" y="70"  width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="32" y="110" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="32" y="150" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="32" y="190" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="32" y="230" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>
  <rect x="32" y="270" width="8" height="8" rx="1" fill="#1a3348" stroke="#9dd7ff" stroke-width=".8"/>

  <!-- IO pads – right edge (output, green tint) -->
  <rect x="356" y="70"  width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>
  <rect x="356" y="110" width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>
  <rect x="356" y="150" width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>
  <rect x="356" y="190" width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>
  <rect x="356" y="230" width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>
  <rect x="356" y="270" width="8" height="8" rx="1" fill="#122818" stroke="#7ee787" stroke-width=".8"/>

  <!-- CLB FABRIC label -->
  <text x="160" y="65" fill="#3a6070" font-size="9" text-anchor="middle" font-family="monospace" letter-spacing="2">CLB FABRIC</text>

  <!-- CLB Grid: 5 cols × 6 rows, pitch H=36 V=32, each cell 28×24 -->
  <!-- Row 0 -->
  <rect x="74"  y="72" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="72" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="146" y="72" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="182" y="72" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="218" y="72" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <!-- Row 1 -->
  <rect x="74"  y="104" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="104" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="146" y="104" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="182" y="104" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="218" y="104" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <!-- Row 2 -->
  <rect x="74"  y="136" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="136" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="146" y="136" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="182" y="136" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="218" y="136" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <!-- Row 3 -->
  <rect x="74"  y="168" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="168" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="146" y="168" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="182" y="168" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="218" y="168" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <!-- Row 4 -->
  <rect x="74"  y="200" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="200" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="146" y="200" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="182" y="200" width="28" height="24" rx="2" fill="#1e3428" stroke="#7ee787" stroke-width=".9" class="clb-active"/>
  <rect x="218" y="200" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <!-- Row 5 -->
  <rect x="74"  y="232" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="110" y="232" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="146" y="232" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="182" y="232" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>
  <rect x="218" y="232" width="28" height="24" rx="2" fill="#101c22" stroke="#23363f" stroke-width=".8"/>

  <!-- Active routing through CLB fabric (animated green dashes) -->
  <!-- CLB(1,2) center=160,116 → CLB(2,2) center=160,148 → CLB(2,1) center=124,148 → CLB(3,2) center=160,180 → CLB(3,3) center=196,180 → CLB(4,3) center=196,212 -->
  <polyline points="160,116 160,148" fill="none" stroke="#7ee787" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6 3" class="df1" filter="url(#glow)" opacity=".9"/>
  <polyline points="160,148 124,148 124,180 160,180" fill="none" stroke="#7ee787" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6 3" class="df2" filter="url(#glow)" opacity=".9"/>
  <polyline points="160,180 196,180 196,212" fill="none" stroke="#7ee787" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="6 3" class="df3" filter="url(#glow)" opacity=".9"/>

  <!-- Global clock H-tree (subtle) -->
  <line x1="160" y1="72"  x2="160" y2="256" stroke="#1e4030" stroke-width=".6" stroke-dasharray="4 5" opacity=".5"/>
  <line x1="74"  y1="172" x2="246" y2="172" stroke="#1e4030" stroke-width=".6" stroke-dasharray="4 5" opacity=".5"/>

  <!-- DSP column label -->
  <text x="267" y="65" fill="#3a6888" font-size="9" text-anchor="middle" font-family="monospace" letter-spacing="1">DSP</text>
  <!-- DSP48 blocks -->
  <rect x="257" y="72"  width="20" height="60" rx="2" fill="#0c1d2c" stroke="#4a8aaa" stroke-width=".9"/>
  <rect x="257" y="140" width="20" height="60" rx="2" fill="#0c1d2c" stroke="#4a8aaa" stroke-width=".9"/>
  <rect x="257" y="208" width="20" height="60" rx="2" fill="#0c1d2c" stroke="#4a8aaa" stroke-width=".9"/>
  <text x="267" y="105" fill="#3a6888" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,267,105)">DSP48</text>
  <text x="267" y="173" fill="#3a6888" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,267,173)">DSP48</text>
  <text x="267" y="241" fill="#3a6888" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,267,241)">DSP48</text>

  <!-- BRAM column label -->
  <text x="303" y="65" fill="#5a4a88" font-size="9" text-anchor="middle" font-family="monospace" letter-spacing="1">BRAM</text>
  <!-- BRAM36 blocks -->
  <rect x="287" y="72"  width="28" height="60" rx="2" fill="#0e1020" stroke="#5a4a88" stroke-width=".9"/>
  <rect x="287" y="140" width="28" height="60" rx="2" fill="#0e1020" stroke="#5a4a88" stroke-width=".9"/>
  <rect x="287" y="208" width="28" height="60" rx="2" fill="#0e1020" stroke="#5a4a88" stroke-width=".9"/>
  <text x="301" y="105" fill="#4a3a78" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,301,105)">BRAM36</text>
  <text x="301" y="173" fill="#4a3a78" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,301,173)">BRAM36</text>
  <text x="301" y="241" fill="#4a3a78" font-size="6.5" text-anchor="middle" font-family="monospace" transform="rotate(-90,301,241)">BRAM36</text>

  <!-- Chip model label at bottom -->
  <text x="197" y="316" fill="#2e4555" font-size="8" text-anchor="middle" font-family="monospace" letter-spacing="1.5">AMD XILINX ULTRASCALE+</text>

  <!-- Data output lines to pipeline (animated) -->
  <line x1="364" y1="114" x2="400" y2="114" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="4 3" class="df1" opacity=".7"/>
  <line x1="364" y1="180" x2="400" y2="180" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="4 3" class="df2" opacity=".7"/>
  <line x1="364" y1="246" x2="400" y2="246" stroke="#7ee787" stroke-width="1.2" stroke-dasharray="4 3" class="df3" opacity=".7"/>

  <!-- ═══════════════════ PIPELINE (right, x=410–1165) ═══════════════════ -->

  <!-- Section heading -->
  <text x="434" y="54" fill="#9dd7ff" font-size="10" font-family="monospace" letter-spacing="3" opacity=".75">HETEROGENEOUS COMPUTE PIPELINE</text>
  <line x1="434" y1="60" x2="1162" y2="60" stroke="#1d3040" stroke-width=".8"/>

  <!-- ── Stage 1: SENSOR INPUT ── -->
  <rect x="430" y="80" width="148" height="74" rx="6" fill="#0e1e2c" stroke="#4a8aaa" stroke-width="1.3"/>
  <text x="504" y="107" fill="#9dd7ff" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">SENSOR IN</text>
  <text x="504" y="123" fill="#5a8aaa" font-size="9"  text-anchor="middle" font-family="monospace">Camera / MIPI CSI</text>
  <text x="504" y="141" fill="#3a5e78" font-size="8.5" text-anchor="middle" font-family="monospace">60 fps · 1920×1080</text>

  <!-- Arrow 1→2 -->
  <line x1="578" y1="117" x2="624" y2="117" stroke="#7ee787" stroke-width="1.4" stroke-dasharray="5 3" class="df1"/>
  <polygon points="624,113 632,117 624,121" fill="#7ee787" opacity=".8"/>

  <!-- ── Stage 2: FPGA CORE ── -->
  <rect x="636" y="80" width="148" height="74" rx="6" fill="#101f18" stroke="#7ee787" stroke-width="1.5"/>
  <text x="710" y="107" fill="#7ee787" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">FPGA CORE</text>
  <text x="710" y="123" fill="#4a8060" font-size="9"  text-anchor="middle" font-family="monospace">ISP · Resize · Norm</text>
  <text x="710" y="141" fill="#3a6050" font-size="8.5" text-anchor="middle" font-family="monospace">~0.2 ms · AXI-Stream</text>

  <!-- Arrow 2→3 -->
  <line x1="784" y1="117" x2="830" y2="117" stroke="#7ee787" stroke-width="1.4" stroke-dasharray="5 3" class="df2"/>
  <polygon points="830,113 838,117 830,121" fill="#7ee787" opacity=".8"/>

  <!-- ── Stage 3: DNN ENGINE ── -->
  <rect x="842" y="80" width="148" height="74" rx="6" fill="#181028" stroke="#c08fff" stroke-width="1.5"/>
  <text x="916" y="107" fill="#c08fff" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">DNN ENGINE</text>
  <text x="916" y="123" fill="#7a60a8" font-size="9"  text-anchor="middle" font-family="monospace">GPU / NPU Inference</text>
  <text x="916" y="141" fill="#5a4080" font-size="8.5" text-anchor="middle" font-family="monospace">YOLO · ResNet · ViT</text>

  <!-- Arrow 3→4 -->
  <line x1="990" y1="117" x2="1036" y2="117" stroke="#7ee787" stroke-width="1.4" stroke-dasharray="5 3" class="df3"/>
  <polygon points="1036,113 1044,117 1036,121" fill="#7ee787" opacity=".8"/>

  <!-- ── Stage 4: CTRL OUTPUT ── -->
  <rect x="1048" y="80" width="114" height="74" rx="6" fill="#0e1e2c" stroke="#4a8aaa" stroke-width="1.3"/>
  <text x="1105" y="107" fill="#9dd7ff" font-size="11" text-anchor="middle" font-family="monospace" font-weight="600">CTRL OUT</text>
  <text x="1105" y="123" fill="#5a8aaa" font-size="9"  text-anchor="middle" font-family="monospace">PCIe / DMA / UART</text>
  <text x="1105" y="141" fill="#3a5e78" font-size="8.5" text-anchor="middle" font-family="monospace">Zero-copy stream</text>

  <!-- ── Performance stats ── -->
  <line x1="434" y1="176" x2="1162" y2="176" stroke="#1d3040" stroke-width=".8"/>
  <text x="444" y="196" fill="#3e5c6e" font-size="8.5" font-family="monospace" letter-spacing="1">PERF</text>

  <text x="570"  y="196" fill="#7ee787" font-size="13" font-family="monospace" font-weight="600">&lt; 1 ms</text>
  <text x="570"  y="210" fill="#3a5a50" font-size="8" font-family="monospace">end-to-end latency</text>

  <text x="730"  y="196" fill="#9dd7ff" font-size="13" font-family="monospace" font-weight="600">60 fps</text>
  <text x="730"  y="210" fill="#3a5060" font-size="8" font-family="monospace">real-time throughput</text>

  <text x="880"  y="196" fill="#c08fff" font-size="13" font-family="monospace" font-weight="600">INT8</text>
  <text x="880"  y="210" fill="#3a3060" font-size="8" font-family="monospace">quantized inference</text>

  <text x="1010" y="196" fill="#7ee787" font-size="13" font-family="monospace" font-weight="600">5–15 W</text>
  <text x="1010" y="210" fill="#3a5a40" font-size="8" font-family="monospace">power envelope</text>

  <!-- ── Signal timing diagram ── -->
  <line x1="434" y1="226" x2="1162" y2="226" stroke="#1d3040" stroke-width=".8"/>

  <!-- CLK trace -->
  <text x="444" y="247" fill="#3e5c6e" font-size="8.5" font-family="monospace">CLK</text>
  <polyline points="472,252 472,240 504,240 504,252 536,252 536,240 568,240 568,252 600,252 600,240 632,240 632,252 664,252 664,240 696,240 696,252 728,252 728,240 760,240 760,252" fill="none" stroke="#3a6050" stroke-width="1" opacity=".55"/>

  <!-- DATA trace (animated) -->
  <text x="444" y="277" fill="#3e5c6e" font-size="8.5" font-family="monospace">DATA</text>
  <polyline points="472,283 472,269 630,269 630,283 790,283 790,269 960,269 960,283 1120,283 1120,269 1162,269 1162,283" fill="none" stroke="#7ee787" stroke-width="1.2" opacity=".65" class="df1"/>

  <!-- VALID trace (animated) -->
  <text x="444" y="307" fill="#3e5c6e" font-size="8.5" font-family="monospace">VALID</text>
  <polyline points="472,313 472,299 800,299 800,313 1020,313 1020,299 1162,299 1162,313" fill="none" stroke="#9dd7ff" stroke-width="1.2" opacity=".65" class="df2"/>

  <!-- Footer annotation -->
  <text x="434" y="342" fill="#1e3040" font-size="7.5" font-family="monospace" letter-spacing=".8">aneesh.mu / fpga · gpu · embedded-vision · compilers / heterogeneous-compute-notebook</text>
</svg>
